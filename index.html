
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mine Field Calculator</title>
<link rel="stylesheet" href="~/Projects/mine-field-calculator/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h2>Mine Field Calculator</h2>

<label>Frontage</label>
<input type="number" id="frontage">

<label>Depth</label>
<input type="number" id="depth">

<label>A/Per</label>
<input type="number" id="aper">

<label>A/Tank</label>
<input type="number" id="atank">

<label>Frag</label>
<input type="number" id="frag" step="0.01">

<button onclick="calculate()">Calculate</button>

<h3>Results</h3>

<p>Perimeter : <span id="perimeter"></span></p>
<p>Barbed Wire : <span id="wire"></span></p>
<p>LAIP : <span id="laip"></span></p>
<p>Transportation Lorry : <span id="lorry"></span></p>
<script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="~/Projects/mine-field-calculator/script.js"></script>

</body>
</html>
